services:
  mysql:
    image: mysql:8.0
    container_name: wholesale-dealer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: wholesale_dealer
      MYSQL_USER: wholesale_app
      MYSQL_PASSWORD: wholesale_dev
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql_data:
